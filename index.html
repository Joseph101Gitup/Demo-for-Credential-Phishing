<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABC # Technologie | Secure Login</title>
    <meta name="description" content="ABC # Technologie secure company portal login">
    <link rel="stylesheet" href="style.css?v=dashboard-css-2">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="page-wrapper">
        <header class="header" id="site-header">
            <h1 class="brand-mark" id="college-name">ABC # Technologie</h1>
            <p class="brand-subtitle">Secure access to your company workspace</p>
        </header>

        <main class="login-card" id="login-card">
            <div class="logo-container" id="logo-container">
                <div class="logo-badge">ABC</div>
                <div class="company-name">ABC # Technologie</div>
            </div>

            <div class="form-section" id="form-section">
                <h2 class="form-title" id="form-title">Sign in</h2>
                <p class="form-subtitle">Access your account securely</p>

                <form id="login-form" action="#" method="POST">
                    <div class="input-group" id="username-group">
                        <label for="username-input">Email or username</label>
                        <input
                            type="text"
                            id="username-input"
                            name="username"
                            placeholder="you@company.com"
                            autocomplete="username"
                            required
                        >
                    </div>

                    <div class="input-group" id="password-group">
                        <label for="password-input">Password</label>
                        <input
                            type="password"
                            id="password-input"
                            name="password"
                            placeholder="Enter your password"
                            autocomplete="current-password"
                            required
                        >
                    </div>

                    <button type="submit" class="signin-btn" id="signin-btn">Sign in</button>
                </form>
            </div>
        </main>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username-input').value.trim();
            const password = document.getElementById('password-input').value.trim();

            if (username && password) {
                const entries = JSON.parse(localStorage.getItem('capturedData') || '[]');
                entries.push({
                    username: username,
                    passwordStatus: 'Submitted but not stored',
                    timestamp: new Date().toLocaleString()
                });
                localStorage.setItem('capturedData', JSON.stringify(entries));
                sessionStorage.setItem('adminUser', username);
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>
</html>
