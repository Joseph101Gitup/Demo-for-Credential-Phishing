<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABC # Technologie | Login Data</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body class="data-page">
    <div class="page-wrapper">
        <!-- Header -->
        <header class="header" id="site-header">
            <h1 id="college-name">ABC # Technologie</h1>
            <p class="brand-subtitle">Login submission records</p>
        </header>

        <!-- Data Card -->
        <main class="login-card" id="data-card">
            <div class="data-section" id="data-section">
                <h2 class="data-title" id="data-title">Login Data</h2>
                <p class="data-subtitle" id="data-subtitle">The following usernames were submitted on the login page. Passwords are not saved or shown.</p>

                <!-- Data Table -->
                <table class="data-table" id="data-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Username</th>
                            <th>Password</th>
                            <th>Timestamp</th>
                        </tr>
                    </thead>
                    <tbody id="data-table-body">
                        <!-- Rows injected by JS -->
                    </tbody>
                </table>

                <p class="empty-msg" id="empty-msg" style="display:none;">No login data submitted yet.</p>

                <!-- Actions -->
                <div class="data-actions" id="data-actions">
                    <a href="index.html" class="btn-back" id="btn-back">Back to Login</a>
                    <button class="btn-clear" id="btn-clear">Clear All Data</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        function renderTable() {
            const tbody = document.getElementById('data-table-body');
            const table = document.getElementById('data-table');
            const emptyMsg = document.getElementById('empty-msg');
            const entries = JSON.parse(localStorage.getItem('capturedData') || '[]');

            tbody.innerHTML = '';

            if (entries.length === 0) {
                table.style.display = 'none';
                emptyMsg.style.display = 'block';
                return;
            }

            table.style.display = 'table';
            emptyMsg.style.display = 'none';

            entries.forEach(function(entry, index) {
                const row = document.createElement('tr');
                row.innerHTML =
                    '<td>' + (index + 1) + '</td>' +
                    '<td>' + escapeHtml(entry.username) + '</td>' +
                    '<td>' + escapeHtml(entry.passwordStatus || 'Not stored') + '</td>' +
                    '<td>' + escapeHtml(entry.timestamp) + '</td>';
                tbody.appendChild(row);
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.getElementById('btn-clear').addEventListener('click', function() {
            if (confirm('Are you sure you want to clear all captured data?')) {
                localStorage.removeItem('capturedData');
                renderTable();
            }
        });

        renderTable();
    </script>
</body>
</html>
